{% extends "base.html" %}

{% block title %}
管理画面ログイン
{% endblock %}

{% block content %}

<h1>管理画面ログイン</h1>

<p>
運営用ページを表示するにはパスワードを入力してください。
</p>

{% if error %}
<p class="warning">{{ error }}</p>
{% endif %}

<form method="post">

    <input type="hidden" name="next" value="{{ next_url }}">

    <label>
        パスワード
        <input type="password" name="password" required>
    </label>

    <br><br>

    <button type="submit">
        ログイン
    </button>

</form>

{% endblock %}
